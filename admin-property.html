<!doctype html>
<html lang="es">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Ebrostay | Editar vivienda</title>
    <meta name="robots" content="noindex,nofollow">
    <link rel="icon" href="assets/favicon.svg" type="image/svg+xml">
    <link rel="apple-touch-icon" href="assets/ebrostay-icon-180.png">
    <link rel="manifest" href="site.webmanifest">
    <meta name="theme-color" content="#0e9f6e">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=Space+Grotesk:wght@500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css?v=design-6">
  </head>
  <body>
    <header class="site-header">
      <a class="brand" href="index.html" aria-label="Ebrostay home">
        <img class="brand-mark" src="assets/ebrostay-icon.svg" alt="" width="36" height="36"><span class="brand-wordmark">Ebrostay</span>
      </a>
      <div class="header-actions">
        <div class="language-switch" aria-label="Language selector">
          <button class="language-option is-active" type="button" data-lang="es">ES</button>
          <button class="language-option" type="button" data-lang="en">EN</button>
        </div>
        <a class="nav-cta" href="admin.html" data-i18n="admin.backToPanel">Volver al panel</a>
      </div>
    </header>

    <main class="detail-page admin-page">
      <a class="admin-back-link" href="admin.html">&larr; <span data-i18n="admin.backToPanel">Volver al panel</span></a>

      <p class="admin-status" id="adminStatus" role="status" hidden></p>

      <div class="admin-toolbar" id="adminToolbar" hidden>
        <span class="user-email" id="adminUserEmail"></span>
        <button class="logout-button" id="adminLogout" type="button" data-i18n="auth.logout">Salir</button>
      </div>

      <div class="admin-properties" id="propertyEditor"></div>
    </main>

    <footer class="site-footer">
      <span class="footer-brand">
        <img class="footer-logo" src="assets/ebrostay-icon.svg" alt="Ebrostay" width="44" height="44">
        <span>&copy; <span id="year"></span> Ebrostay</span>
      </span>
      <a href="mailto:info@ebrostay.com">info@ebrostay.com</a>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.jsdelivr.net/npm/pdfjs-dist@3.11.174/build/pdf.min.js"></script>
    <script>
      // Extract text from uploaded PDFs in the browser so the AI helper only
      // ever receives plain text (cheaper and simpler than parsing on the server).
      if (window.pdfjsLib) {
        pdfjsLib.GlobalWorkerOptions.workerSrc = "https://cdn.jsdelivr.net/npm/pdfjs-dist@3.11.174/build/pdf.worker.min.js";
      }
    </script>
    <script src="supabase-config.js?v=design-6"></script>
    <script src="data.js?v=design-7"></script>
    <script src="backend.js?v=design-6"></script>
    <script src="admin-property.js?v=design-7"></script>
  </body>
</html>
