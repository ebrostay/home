<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64" role="img" aria-label="Ebrostay">
  <defs>
    <linearGradient id="ebg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#13b878"/>
      <stop offset="1" stop-color="#0a7a54"/>
    </linearGradient>
  </defs>
  <rect width="64" height="64" rx="15" fill="url(#ebg)"/>
  <g fill="#ffffff">
    <!-- bridge deck -->
    <rect x="8" y="25.5" width="48" height="4.6" rx="2.3"/>
    <!-- bridge body with three arches (knockouts reveal the gradient) -->
    <path fill-rule="evenodd" d="M9.5 30 L54.5 30 L54.5 44 L9.5 44 Z
      M12.8 44 L12.8 38.5 A5.6 5.6 0 0 1 24 38.5 L24 44 Z
      M26.4 44 L26.4 38.5 A5.6 5.6 0 0 1 37.6 38.5 L37.6 44 Z
      M40 44 L40 38.5 A5.6 5.6 0 0 1 51.2 38.5 L51.2 44 Z"/>
  </g>
  <!-- Ebro river -->
  <rect x="12" y="48" width="40" height="3.4" rx="1.7" fill="#c8f169"/>
</svg>
